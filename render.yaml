databases:
  - name: fintech_db
    databaseName: fintech_db
    user: postgres
    plan: free

services:
  - type: redis
    name: fintech_redis
    plan: free
    ipAllowList: []

  - type: web
    name: cyber-talent-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fintech_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fintech_redis
          property: connectionString
      - key: PORT
        value: 10000
      - key: KAFKA_BROKERS
        value: "" # Requires external Kafka (e.g., Confluent Cloud or Upstash)
